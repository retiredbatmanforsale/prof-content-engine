<?xml version="1.0" encoding="UTF-8"?>
<svg width="580" height="120" viewBox="0 0 580 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="580" height="120" rx="16" fill="#FFFFFF"/>
  
  <!-- Base text in dark color -->
  <text x="40" y="75" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="600" letter-spacing="0" fill="#1A1A2E">
     ai seekhega india
  </text>
  
  <!-- Correctly positioned colored dots for the i's -->
  <!-- Remove original dot from "i" in "ai" -->
  <rect x="88" y="25" width="15" height="15" fill="#FFFFFF"/>
  <!-- Add orange dot for "i" in "ai" -->
  <circle cx="83" cy="33" r="6" fill="#FF9933"/>
  
  <!-- Remove original dot from "i" in "india" -->
  <rect x="408" y="25" width="15" height="15" fill="#FFFFFF"/>
  <!-- Add green dot for "i" in "india" -->
  <circle cx="417" cy="33" r="6" fill="#138808"/>
  
  <!-- Minimal tech accent line -->
  <line x1="40" y1="90" x2="535" y2="90" stroke="#3D5AFE" stroke-width="1" stroke-opacity="0.5"/>
</svg>