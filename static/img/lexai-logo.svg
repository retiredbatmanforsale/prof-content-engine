<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Lex AI logo</title>
  <desc id="desc">A glowing blue flower with a brain in the center on a dark background.</desc>
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1e40ff" stop-opacity="0.2" />
      <stop offset="40%" stop-color="#1d4ed8" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#020617" stop-opacity="0.95" />
    </radialGradient>
    <linearGradient id="petalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="40%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="petalGradientSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="40%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#22c1c3" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feColorMatrix
        in="blur"
        type="matrix"
        values="0 0 0 0 0.35  0 0 0 0 0.56  0 0 0 0 1  0 0 0 0.85 0"
      />
    </filter>
  </defs>

  <!-- Soft dark background with glow -->
  <rect width="512" height="512" rx="120" fill="#020617" />
  <circle cx="256" cy="256" r="200" fill="url(#bgGradient)" />
  <circle cx="256" cy="256" r="180" fill="none" stroke="#1d4ed8" stroke-opacity="0.35" stroke-width="4" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="#22d3ee" stroke-opacity="0.18" stroke-width="10" filter="url(#glow)" />

  <!-- Petal group -->
  <g transform="translate(256 256)">
    <!-- Top petal -->
    <path
      d="M0 -188 C-64 -188 -120 -144 -120 -78 C-120 -12 -64 40 0 40 C64 40 120 -12 120 -78 C120 -144 64 -188 0 -188 Z"
      fill="url(#petalGradient)"
    />
    <!-- Bottom petal -->
    <path
      d="M0 188 C-64 188 -120 144 -120 78 C-120 12 -64 -40 0 -40 C64 -40 120 12 120 78 C120 144 64 188 0 188 Z"
      fill="url(#petalGradientSoft)"
    />
    <!-- Left petal -->
    <path
      d="M-188 0 C-188 -64 -144 -120 -78 -120 C-12 -120 40 -64 40 0 C40 64 -12 120 -78 120 C-144 120 -188 64 -188 0 Z"
      fill="url(#petalGradientSoft)"
    />
    <!-- Right petal -->
    <path
      d="M188 0 C188 -64 144 -120 78 -120 C12 -120 -40 -64 -40 0 C-40 64 12 120 78 120 C144 120 188 64 188 0 Z"
      fill="url(#petalGradient)"
    />
    <!-- Top-left petal -->
    <path
      d="M-132 -132 C-180 -84 -176 -8 -116 16 C-56 40 8 8 32 -52 C56 -112 36 -168 -24 -192 C-76 -212 -120 -180 -132 -132 Z"
      fill="url(#petalGradientSoft)"
      opacity="0.9"
    />
    <!-- Top-right petal -->
    <path
      d="M132 -132 C180 -84 176 -8 116 16 C56 40 -8 8 -32 -52 C-56 -112 -36 -168 24 -192 C76 -212 120 -180 132 -132 Z"
      fill="url(#petalGradient)"
      opacity="0.9"
    />
    <!-- Bottom-left petal -->
    <path
      d="M-132 132 C-180 84 -176 8 -116 -16 C-56 -40 8 -8 32 52 C56 112 36 168 -24 192 C-76 212 -120 180 -132 132 Z"
      fill="url(#petalGradient)"
      opacity="0.9"
    />
    <!-- Bottom-right petal -->
    <path
      d="M132 132 C180 84 176 8 116 -16 C56 -40 -8 -8 -32 52 C-56 112 -36 168 24 192 C76 212 120 180 132 132 Z"
      fill="url(#petalGradientSoft)"
      opacity="0.9"
    />
  </g>

  <!-- Central brain shape -->
  <g transform="translate(256 256)">
    <defs>
      <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#e5f4ff" />
        <stop offset="100%" stop-color="#ffffff" />
      </linearGradient>
    </defs>
    <path
      d="M-64 -70
         C-92 -70 -112 -50 -112 -22
         C-132 -18 -144 0 -144 22
         C-144 46 -130 64 -110 70
         C-112 80 -110 92 -102 102
         C-92 116 -76 124 -60 122
         C-52 136 -36 144 -18 144
         C-4 144 8 140 18 132
         C28 140 40 144 54 144
         C72 144 88 134 98 118
         C112 116 124 104 130 88
         C138 70 136 52 126 38
         C136 24 140 8 136 -8
         C132 -32 114 -50 90 -54
         C84 -76 64 -92 40 -92
         C26 -92 14 -88 4 -82
         C-6 -90 -18 -94 -32 -94
         C-44 -94 -54 -90 -64 -84
         Z"
      fill="url(#brainGradient)"
      stroke="#0f172a"
      stroke-width="5"
      stroke-linejoin="round"
    />
    <!-- Brain folds -->
    <path
      d="M-72 -40 C-50 -56 -30 -48 -16 -34 C-4 -22 10 -18 24 -22 C40 -26 52 -26 66 -18"
      fill="none"
      stroke="#0f172a"
      stroke-width="4"
      stroke-linecap="round"
      opacity="0.9"
    />
    <path
      d="M-80 0 C-60 -12 -44 -6 -32 4 C-18 16 -4 20 14 18 C32 16 48 18 62 28"
      fill="none"
      stroke="#0f172a"
      stroke-width="4"
      stroke-linecap="round"
      opacity="0.85"
    />
    <path
      d="M-70 40 C-50 30 -34 34 -22 44 C-10 54 4 60 22 60 C40 60 54 66 68 78"
      fill="none"
      stroke="#0f172a"
      stroke-width="4"
      stroke-linecap="round"
      opacity="0.8"
    />
    <!-- Center groove -->
    <path
      d="M4 -72 C-4 -54 -6 -34 -2 -16 C2 -2 2 10 -2 24 C-6 38 -6 52 0 66"
      fill="none"
      stroke="#0f172a"
      stroke-width="5"
      stroke-linecap="round"
      opacity="0.9"
    />
  </g>
</svg>
